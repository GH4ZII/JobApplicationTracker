services:
  postgres:
    image: postgres:16
    container_name: jat-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobtracker
    ports:
      - "5433:5432"
    volumes:
      - jat_pg_data:/var/lib/postgresql/data

volumes:
  jat_pg_data:
